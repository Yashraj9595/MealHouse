<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Health &amp; Wellness - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                        "warm-cream": "#F5F2E9",
                        "dark-action": "#221610",
                    },
                    fontFamily: {
                        "display": ["Lexend", "Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1.25rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-[440px] bg-warm-cream dark:bg-stone-900 rounded-xl shadow-xl overflow-hidden border border-stone-200 dark:border-stone-800">
<!-- Top App Bar Style Header -->
<div class="flex items-center p-6 pb-2 justify-between">
<div class="text-stone-800 dark:text-stone-100 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-stone-200/50 dark:hover:bg-stone-800 cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-stone-800 dark:text-stone-100 text-sm font-semibold leading-tight tracking-wide flex-1 text-center pr-10 uppercase">Zenith Wellness</h2>
</div>
<div class="px-8 pt-8 pb-4 text-center">
<h1 class="text-stone-900 dark:text-white text-3xl font-bold leading-tight mb-2">Welcome Back</h1>
<p class="text-stone-600 dark:text-stone-400 text-base font-normal">Please sign in to continue your journey to wellness</p>
</div>
<!-- Login Form -->
<form class="px-8 py-4 space-y-5">
<div class="flex flex-col gap-1.5">
<label class="text-stone-700 dark:text-stone-300 text-sm font-semibold ml-1">Email Address</label>
<input class="w-full rounded-xl border-stone-200 dark:border-stone-700 bg-white dark:bg-stone-800 text-stone-900 dark:text-stone-100 focus:ring-primary focus:border-primary h-14 px-4 text-base transition-all" placeholder="name@example.com" type="email"/>
</div>
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center ml-1">
<label class="text-stone-700 dark:text-stone-300 text-sm font-semibold">Password</label>
<a class="text-primary text-xs font-bold hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative flex items-center">
<input class="w-full rounded-xl border-stone-200 dark:border-stone-700 bg-white dark:bg-stone-800 text-stone-900 dark:text-stone-100 focus:ring-primary focus:border-primary h-14 px-4 pr-12 text-base transition-all" placeholder="Enter your password" type="password"/>
<button class="absolute right-4 text-stone-400 hover:text-stone-600 dark:hover:text-stone-200" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<button class="w-full bg-dark-action dark:bg-primary text-white font-bold h-14 rounded-xl hover:opacity-90 transition-opacity mt-2 shadow-lg flex items-center justify-center gap-2" type="submit">
                Sign In
                <span class="material-symbols-outlined">login</span>
</button>
</form>
<!-- Social Logins -->
<div class="px-8 py-4">
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-stone-300 dark:border-stone-700"></div>
<span class="flex-shrink mx-4 text-stone-500 dark:text-stone-400 text-xs font-medium uppercase tracking-widest">Or continue with</span>
<div class="flex-grow border-t border-stone-300 dark:border-stone-700"></div>
</div>
<div class="grid grid-cols-2 gap-4 mt-2">
<button class="flex items-center justify-center gap-2 h-12 rounded-xl border border-stone-200 dark:border-stone-700 bg-white dark:bg-stone-800 text-stone-700 dark:text-stone-200 font-medium hover:bg-stone-50 dark:hover:bg-stone-700 transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="currentColor"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="currentColor"></path>
</svg>
                    Google
                </button>
<button class="flex items-center justify-center gap-2 h-12 rounded-xl border border-stone-200 dark:border-stone-700 bg-white dark:bg-stone-800 text-stone-700 dark:text-stone-200 font-medium hover:bg-stone-50 dark:hover:bg-stone-700 transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.96.95-2.22 1.72-3.71 1.72-1.47 0-2.25-.84-3.69-.84-1.45 0-2.39.82-3.69.82-1.41 0-2.73-.8-3.65-1.77C.32 18.2.22 14.82 2.1 11.89c.92-1.44 2.4-2.3 3.86-2.3 1.43 0 2.27.8 3.55.8.19 0 .39-.02.59-.05.15.02.32.05.51.05 1.28 0 2.11-.8 3.55-.8 1.46 0 2.94.86 3.86 2.3-1.48 1.83-1.57 5.15.89 6.89-.62 1.48-1.28 2.82-1.86 3.5zM12.03 9.25c-.05 0-.09 0-.14.01.07-1.92 1.76-3.48 3.73-3.52.05 0 .09 0 .14-.01-.08 1.93-1.76 3.48-3.73 3.52z" fill="currentColor"></path>
</svg>
                    Apple
                </button>
</div>
</div>
<!-- Toggle Footer -->
<div class="px-8 py-8 text-center bg-stone-100 dark:bg-stone-950/30 border-t border-stone-200 dark:border-stone-800 mt-4">
<p class="text-stone-600 dark:text-stone-400 text-sm font-medium">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline ml-1" href="#">Create an Account</a>
</p>
</div>
</div>
</body></html>
