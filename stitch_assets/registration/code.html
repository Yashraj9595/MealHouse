<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Zenith Wellness - Create Account</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                        "neutral-soft": "#f2eee9",
                        "charcoal": "#1a1a1a"
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center">
<div class="relative flex h-full min-h-screen w-full max-w-[480px] flex-col bg-background-light dark:bg-background-dark overflow-x-hidden pb-10">
<!-- Top Navigation -->
<div class="flex items-center p-4 pt-6">
<button aria-label="Go back" class="flex size-10 items-center justify-center rounded-full bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 transition-colors">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-200">arrow_back</span>
</button>
</div>
<!-- Header -->
<div class="px-6 pt-6 pb-2">
<h1 class="text-slate-900 dark:text-slate-50 tracking-tight text-[32px] font-bold leading-tight">Create Account</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed mt-2">Join Zenith Wellness and start your journey today.</p>
</div>
<!-- Registration Form -->
<div class="flex flex-col gap-5 px-6 pt-6">
<!-- Full Name Input -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Full Name</label>
<div class="relative">
<input class="w-full rounded-xl bg-white dark:bg-slate-800 border-none shadow-sm ring-1 ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary h-14 px-4 text-base transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Email Address</label>
<div class="relative">
<input class="w-full rounded-xl bg-white dark:bg-slate-800 border-none shadow-sm ring-1 ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary h-14 px-4 text-base transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="example@zenith.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Password</label>
<div class="relative">
<input class="w-full rounded-xl bg-white dark:bg-slate-800 border-none shadow-sm ring-1 ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary h-14 px-4 pr-12 text-base transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Create a strong password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full bg-charcoal dark:bg-primary text-white font-bold py-4 rounded-xl mt-4 shadow-lg hover:opacity-90 active:scale-[0.98] transition-all">
                Sign Up
            </button>
<!-- Divider -->
<div class="flex items-center gap-4 my-4">
<div class="h-[1px] flex-1 bg-slate-200 dark:bg-slate-700"></div>
<span class="text-xs font-medium text-slate-400 uppercase tracking-widest">Or sign up with</span>
<div class="h-[1px] flex-1 bg-slate-200 dark:bg-slate-700"></div>
</div>
<!-- Social Options -->
<div class="flex flex-col gap-3">
<button class="flex items-center justify-center gap-3 w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl h-14 font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
<img alt="" class="size-5" data-alt="Google logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDbJZp6-ySLmB-V40wjLTXQpeoe9teWfsD4AeCzxxx-W07KLRCbfiDqx1APHhbaBzEuCFKk3_cCTyJLfC8tZYPUhA9OVSoa--eFPjGNlqmIiYZOgNPcRrrcr7gTAunhsTaltGIIf79Mtw29S-wLNP6xgsg4Bcl-mE8qWq_KzM_TC30m_IKrLisGqHzam26qW0H6G_at41oONbrqkUfLyp_MhF44HF4U7r0j7TRGUWADci_A4rjtaygCCm0hTdcsbcxOttueGSwGxw"/>
<span>Sign up with Google</span>
</button>
<button class="flex items-center justify-center gap-3 w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl h-14 font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
<svg class="size-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.96 0-2.04-.6-3.23-.6-1.16 0-2.12.56-3.13.56-1.54 0-4.04-2.81-4.04-5.91 0-2.91 1.83-4.45 3.58-4.45 1.04 0 1.9.68 2.72.68.79 0 1.85-.75 3.05-.75 1.29 0 2.45.64 3.1 1.54-2.58 1.1-2.16 4.39.46 5.56-.63 1.52-1.46 2.93-2.51 2.93zm-3.66-13.62c.57-.7 1.34-1.2 1.34-1.2s-.08-.85-.68-1.5c-.56-.62-1.47-1.1-1.47-1.1s-1.18.06-1.83.69c-.61.6-.66 1.48-.66 1.48s.86.08 1.5.6c.55.45 1.2 1.03 1.8 1.03z"></path>
</svg>
<span>Sign up with Apple</span>
</button>
</div>
</div>
<!-- Footer -->
<div class="mt-auto px-6 py-8 text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                Already have an account? 
                <a class="text-primary font-bold hover:underline" href="#">Sign In</a>
</p>
</div>
<!-- Decorative Element -->
<div class="absolute -bottom-24 -right-24 size-64 bg-primary/10 dark:bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute -top-12 -left-12 size-48 bg-primary/10 dark:bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
</div>
</body></html>
